<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uma Surpresa 💖</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
  height: 100vh;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

/* CONTAINER PRINCIPAL */
.container {
  text-align: center;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 25px;
  align-items: center;
}

/* TEXTO */
h1 {
  font-size: 28px;
}

/* BOTÃO */
button {
  padding: 12px 30px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff1e4d;
  transform: scale(1.05);
}

/* CORAÇÃO */
.heart {
  position: relative;
  width: 100px;
  height: 90px;
  margin-top: 20px;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 50px;
  height: 80px;
  background: red;
  border-radius: 50px 50px 0 0;
}

.heart::before {
  left: 50px;
  transform: rotate(-45deg);
  transform-origin: 0 100%;
}

.heart::after {
  left: 0;
  transform: rotate(45deg);
  transform-origin: 100% 100%;
}

/* ESTRELAS */
.star {
  position: absolute;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  animation: subir linear infinite;
}

@keyframes subir {
  0% {
    transform: translateY(0) scale(0.5);
    opacity: 0;
  }
  30% {
    opacity: 1;
  }
  100% {
    transform: translateY(-110vh) scale(1.2);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>Você é muito especial 💖</h1>
  <button onclick="mostrarCoracao()">Clique aqui</button>
  <div id="coracao"></div>
</div>

<script>

/* BOTÃO MOSTRA CORAÇÃO */
function mostrarCoracao() {
  document.getElementById("coracao").innerHTML = "<div class='heart'></div>";
}

/* CRIAR ESTRELAS SUAVES */
function criarEstrela() {
  const star = document.createElement("div");
  star.classList.add("star");

  star.style.left = Math.random() * 100 + "vw";
  star.style.bottom = "-10px";
  star.style.animationDuration = (4 + Math.random() * 4) + "s";

  document.body.appendChild(star);

  setTimeout(() => {
    star.remove();
  }, 8000);
}

setInterval(criarEstrela, 300);

</script>

</body>
</html>
